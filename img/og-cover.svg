<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1c130a"/><stop offset="1" stop-color="#0e0905"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c9975e"/><stop offset="1" stop-color="#e6ba83"/></linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.26" r="0.7"><stop offset="0" stop-color="#c9975e" stop-opacity="0.22"/><stop offset="1" stop-color="#c9975e" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.5" fill="#c9975e" opacity="0.05"/></pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- badge -->
  <rect x="80" y="84" width="452" height="46" rx="23" fill="none" stroke="#c9975e" stroke-opacity="0.4"/>
  <circle cx="110" cy="107" r="5" fill="#c9975e"/>
  <text x="132" y="113" font-family="system-ui,Segoe UI,sans-serif" font-size="16" letter-spacing="2.5" fill="#d4a574">БЕЗКОШТОВНИЙ 5-ДЕННИЙ ІНТЕНСИВ</text>

  <!-- title -->
  <text x="78" y="258" font-family="Georgia,'Cormorant Garamond',serif" font-size="112" font-weight="600" fill="#f5f0e8">Товарка</text>
  <text x="78" y="372" font-family="Georgia,'Cormorant Garamond',serif" font-size="112" font-weight="600" font-style="italic" fill="url(#gold)">з Китаєм</text>

  <text x="80" y="446" font-family="system-ui,Segoe UI,sans-serif" font-size="23" fill="#f5f0e8" opacity="0.6">Знаходь товари · аналізуй · створюй продаючі сайти</text>

  <!-- CTA pill -->
  <rect x="80" y="498" width="346" height="62" rx="31" fill="url(#gold)"/>
  <text x="253" y="537" font-family="system-ui,Segoe UI,sans-serif" font-size="21" font-weight="600" letter-spacing="0.5" fill="#1a120a" text-anchor="middle">Приєднатися в Telegram</text>

  <!-- right: margin callout -->
  <g transform="translate(838,150)">
    <rect x="0" y="0" width="282" height="330" rx="24" fill="#c9975e" opacity="0.06"/>
    <rect x="0" y="0" width="282" height="330" rx="24" fill="none" stroke="#c9975e" stroke-opacity="0.22"/>
    <text x="141" y="56" font-family="system-ui,Segoe UI,sans-serif" font-size="15" letter-spacing="2" fill="#d4a574" text-anchor="middle">ЗАКУПІВЛЯ → ПРОДАЖ</text>
    <text x="141" y="124" font-family="Georgia,serif" font-size="38" fill="#f5f0e8" text-anchor="middle">10–15 → 250 ₴</text>
    <line x1="44" y1="156" x2="238" y2="156" stroke="#c9975e" stroke-opacity="0.2"/>
    <text x="141" y="236" font-family="Georgia,serif" font-size="76" font-weight="700" fill="url(#gold)" text-anchor="middle">×15–20</text>
    <text x="141" y="282" font-family="system-ui,Segoe UI,sans-serif" font-size="18" letter-spacing="3" fill="#d4a574" text-anchor="middle">МАРЖА</text>
  </g>
</svg>
